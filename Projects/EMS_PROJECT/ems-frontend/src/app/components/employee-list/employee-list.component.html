<h2>Employee List</h2>
<table class="employee-table">
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Department</th>
    <th>Designation</th>
    <th>Salary</th>
    <th>Address</th>
    <th>Gender</th>
    <th>Date of Joining</th>
    <th>Actions</th>
  </tr>
  <tr *ngFor="let emp of employees">
    <td>{{ emp.id }}</td>
    <td>{{ emp.name }}</td>
    <td>{{ emp.email }}</td>
    <td>{{ emp.phone }}</td>
    <td>{{ emp.department }}</td>
    <td>{{ emp.designation }}</td>
    <td>{{ emp.salary }}</td>
    <td>{{ emp.address }}</td>
    <td>{{ emp.gender }}</td>
    <td>{{ emp.dateOfJoining }}</td>
    <td>
      <button class="edit-btn" (click)="editEmployee(emp)">Edit</button>
      <button class="delete-btn" (click)="deleteEmployee(emp.id)">Delete</button>
    </td>
  </tr>
</table>
